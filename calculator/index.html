<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 class="text-alignment">Calculate me!</h1>
    </header>
    <main>
        <div class="container">
            <div class="row">
                <input class="input" type="text" placeholder="Calculate here">
            </div>
            <div class="row">
                <button class="bttn special">C</button>
                <button class="bttn special">M+</button>
                <button class="bttn special">M-</button>
                <button class="bttn special">%</button>
            </div>
            <div class="row">
                <button class="bttn">7</button>
                <button class="bttn">8</button>
                <button class="bttn">9</button>
                <button class="bttn special">/</button>
            </div>
            <div class="row">
                <button class="bttn">4</button>
                <button class="bttn">5</button>
                <button class="bttn">6</button>
                <button class="bttn special">*</button>
            </div>
            <div class="row">
                <button class="bttn">1</button>
                <button class="bttn">2</button>
                <button class="bttn">3</button>
                <button class="bttn special">-</button>
            </div>
            <div class="row">
                <button class="bttn">0</button>
                <button class="bttn">.</button>
                <button class="bttn special">=</button>
                <button class="bttn special">+</button>
            </div>
        </div> 
    </main>
    <footer></footer>
</body>
<script src="cal.js"></script>
</html>
